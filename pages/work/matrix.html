<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/image/icon_matrix.png" type="image/x-icon">
    <title>Matrix 密集数字雨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 字符集
    const chars = '01234567890アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヰヱヲンガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポ';
    
    // ================== 核心：改成超密集 ==================
    const fontSize = 12;     // 字体更小
    const columnWidth = 10; // 列间距更小（越密数值越小）
    // ======================================================

    const columns = Math.floor(canvas.width / columnWidth);
    const drops = [];

    // 初始化雨滴位置
    for (let x = 0; x < columns; x++) {
        drops[x] = Math.random() * canvas.height;
    }

    function draw() {
        // 拖尾效果
        ctx.fillStyle = 'rgba(0, 0, 0, 0.07)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#00FF41'; // 电影绿
        ctx.font = `${fontSize}px monospace`;

        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * columnWidth, drops[i]);

            // 到底部随机重置
            if (drops[i] > canvas.height && Math.random() > 0.98) {
                drops[i] = 0;
            }

            drops[i] += fontSize; // 下落速度
        }
    }

    setInterval(draw, 30);

    // 窗口自适应
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
